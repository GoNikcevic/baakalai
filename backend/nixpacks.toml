[phases.setup]
nixPkgs = ["nodejs_20", "python311", "gcc", "gnumake", "pkg-config"]

[phases.install]
cmds = ["cd backend && npm install --build-from-source", "cd frontend && npm install --include=dev"]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && node server.js"
