version: "3.9"

services:
  n8n:
    build:
      context: ..
      dockerfile: n8n/Dockerfile
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      # --- Core ---
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Europe/Paris
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-in-production}

      # --- Auth (basic auth for local) ---
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin}

      # --- Webhook URL (for external triggers) ---
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}

      # --- External API keys (inject via .env) ---
      - LEMLIST_API_KEY=${LEMLIST_API_KEY:-}
      - NOTION_TOKEN=${NOTION_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # --- Execution settings ---
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  n8n-data:
